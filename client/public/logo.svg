<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .petal-light { fill: #d4bee4; }
      .petal-medium { fill: #a981c2; }
      .petal-dark { fill: #703081; }
      .texto-id { fill: white; font-family: 'Geist Variable', sans-serif; font-weight: bold; font-size: 44px; }
      .texto-principal { fill: #703081; font-family: 'Geist Variable', sans-serif; font-size: 36px; }
    </style>
  </defs>

  <!-- Flower petals — concentric geometric paths -->
  <g transform="translate(200, 155)">
    <!-- Outer ring: 6 light petals -->
    <path class="petal-light" d="M0,-75 Q30,-110 0,-130 Q-30,-110 0,-75Z" transform="rotate(0)" />
    <path class="petal-light" d="M0,-75 Q30,-110 0,-130 Q-30,-110 0,-75Z" transform="rotate(60)" />
    <path class="petal-light" d="M0,-75 Q30,-110 0,-130 Q-30,-110 0,-75Z" transform="rotate(120)" />
    <path class="petal-light" d="M0,-75 Q30,-110 0,-130 Q-30,-110 0,-75Z" transform="rotate(180)" />
    <path class="petal-light" d="M0,-75 Q30,-110 0,-130 Q-30,-110 0,-75Z" transform="rotate(240)" />
    <path class="petal-light" d="M0,-75 Q30,-110 0,-130 Q-30,-110 0,-75Z" transform="rotate(300)" />

    <!-- Middle ring: 6 medium petals rotated 30° -->
    <path class="petal-medium" d="M0,-55 Q25,-85 0,-100 Q-25,-85 0,-55Z" transform="rotate(30)" />
    <path class="petal-medium" d="M0,-55 Q25,-85 0,-100 Q-25,-85 0,-55Z" transform="rotate(90)" />
    <path class="petal-medium" d="M0,-55 Q25,-85 0,-100 Q-25,-85 0,-55Z" transform="rotate(150)" />
    <path class="petal-medium" d="M0,-55 Q25,-85 0,-100 Q-25,-85 0,-55Z" transform="rotate(210)" />
    <path class="petal-medium" d="M0,-55 Q25,-85 0,-100 Q-25,-85 0,-55Z" transform="rotate(270)" />
    <path class="petal-medium" d="M0,-55 Q25,-85 0,-100 Q-25,-85 0,-55Z" transform="rotate(330)" />

    <!-- Center: dark circle with ID monogram -->
    <circle r="40" class="petal-dark" />
    <circle r="36" fill="white" fill-opacity="0.15" />
    <text x="0" y="14" text-anchor="middle" class="texto-id">ID</text>
  </g>

  <text x="200" y="320" text-anchor="middle" class="texto-principal">Inquieta Dulzura</text>
</svg>
