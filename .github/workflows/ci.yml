name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DB_HOST: localhost
  DB_USER: root
  DB_PASSWORD: root
  DB_NAME: inquieta_dulzura
  DB_PORT: 3306

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: inquieta_dulzura
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build server
        run: npm run build:server

      - name: Type-check client
        run: npx tsc --noEmit -p client/tsconfig.json

      - name: Build client
        run: npm run build:client

      - name: Test server
        run: npm run test:server
        env:
          DB_HOST: localhost
          DB_USER: root
          DB_PASSWORD: root
          DB_NAME: inquieta_dulzura
          DB_PORT: 3306

      - name: Test client
        run: npm run test:client
